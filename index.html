<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Otter AR – Node 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; }
    canvas { display: block; }

    #infoBox {
      display: none;
      position: absolute;
      top: 20px;
      left: 20px;
      width: 60vw;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      padding: 16px;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      line-height: 1.5;
      z-index: 10;
    }

    #closeBtn {
      float: right;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #eee;
    }

    #popupOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 20;
      align-items: center;
      justify-content: center;
    }

    #popupContent {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      color: #222;
    }

    #popupClose {
      float: right;
      cursor: pointer;
      font-size: 18px;
      color: #333;
    }

    button {
      background: #0077aa;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      margin-top: 8px;
      margin-right: 6px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Info Box -->
  <div id="infoBox">
    <button id="closeBtn" onclick="document.getElementById('infoBox').style.display='none'">×</button>
    <strong>Blackpool Headwaters – Morning Departure</strong>
    <div id="narrationText"></div>
    <div id="extraButtons" style="display:none; margin-top:12px;"></div>
  </div>

  <!-- Popup -->
  <div id="popupOverlay">
    <div id="popupContent">
      <span id="popupClose" onclick="document.getElementById('popupOverlay').style.display='none'">×</span>
      <div id="popupText"></div>
    </div>
  </div>

  <!-- Audio (hidden) -->
  <audio id="narrationAudio" src=""></audio>

  <!-- Main JS -->
  <script type="module" src="./main.js"></script>
</body>
</html>
